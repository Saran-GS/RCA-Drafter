<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RCA Agent — Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --font-mono: 'JetBrains Mono', 'Fira Code', monospace;
      --bg: #0d0f14;
      --surface: #13161e;
      --surface-2: #181c26;
      --surface-3: #1e2333;
      --border: rgba(99,120,180,0.18);
      --border-hover: rgba(99,120,180,0.38);
      --border-focus: rgba(137,180,250,0.6);
      --text: #cdd6f4;
      --text-muted: #7d8ab0;
      --text-faint: #3d4460;
      --green: #a6e3a1;
      --red: #f38ba8;
      --mauve: #cba6f7;
      --accent: #89b4fa;
      --accent-hover: #a4c6ff;
      --accent-glow: rgba(137,180,250,0.2);
      --radius-md: 8px;
      --radius-lg: 12px;
      --transition: 160ms cubic-bezier(0.16,1,0.3,1);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: var(--font-mono);
      font-size: 0.88rem;
      color: var(--text);
      background: var(--bg);
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      -webkit-font-smoothing: antialiased;
      overflow: hidden;
      position: relative;
    }
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(99,120,180,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(99,120,180,0.04) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }
    .login-card {
      position: relative; z-index: 1;
      width: 100%; max-width: 420px; padding: 40px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      box-shadow: 0 0 0 1px rgba(137,180,250,0.06), 0 8px 32px rgba(0,0,0,0.5), 0 2px 8px rgba(0,0,0,0.4);
    }
    .login-header { margin-bottom: 28px; }
    .login-title { font-size: 1.15rem; font-weight: 700; color: var(--text); margin-bottom: 6px; }
    .login-subtitle { font-size: 0.78rem; color: var(--text-muted); line-height: 1.5; }
    .form-group { margin-bottom: 18px; }
    .form-label { display: block; font-size: 0.72rem; font-weight: 500; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 8px; }
    .form-input {
      width: 100%; background: var(--surface-2); border: 1px solid var(--border);
      border-radius: var(--radius-md); color: var(--text);
      font-family: var(--font-mono); font-size: 0.85rem;
      padding: 10px 12px; outline: none;
    }
    .btn-login {
      width: 100%; padding: 11px 20px;
      background: var(--accent); color: #0d0f14;
      border: 1px solid var(--accent); border-radius: var(--radius-md);
      font-family: var(--font-mono); font-size: 0.85rem; font-weight: 600;
      cursor: pointer;
    }
    .error-msg { display: none; padding: 10px 12px; background: rgba(243,139,168,0.08); border: 1px solid rgba(243,139,168,0.3); border-radius: var(--radius-md); color: var(--red); font-size: 0.78rem; margin-bottom: 16px; }
    .error-msg.visible { display: block; }
    .success-overlay { display: none; padding: 20px 0; text-align: center; color: var(--green); }
    .success-overlay.visible { display: block; }
  </style>
</head>
<body>
<div class="login-card" role="main">
  <div class="login-header">
    <div class="login-title">Welcome back</div>
    <div class="login-subtitle">Sign in to access the incident analysis pipeline</div>
  </div>

  <div class="success-overlay" id="successOverlay">
    Authentication successful. Redirecting to RCA dashboard...
  </div>

  <form id="loginForm" novalidate>
    <div class="error-msg" id="errorMsg" role="alert">
      <span id="errorText">Invalid username or password.</span>
    </div>

    <div class="form-group">
      <label class="form-label" for="username">Username</label>
      <input class="form-input" type="text" id="username" name="username" placeholder="admin" autocomplete="username" spellcheck="false">
    </div>

    <div class="form-group">
      <label class="form-label" for="password">Password</label>
      <input class="form-input" type="password" id="password" name="password" placeholder="••••••••" autocomplete="current-password">
    </div>

    <button type="submit" class="btn-login" id="loginBtn">Sign in</button>
  </form>
</div>

<script>
document.getElementById('loginForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value;
  const btn = document.getElementById('loginBtn');
  const errorDiv = document.getElementById('errorMsg');
  const errorTxt = document.getElementById('errorText');

  errorDiv.classList.remove('visible');

  if (!username || !password) {
    errorTxt.textContent = 'Please enter both username and password.';
    errorDiv.classList.add('visible');
    return;
  }

  btn.disabled = true;
  btn.textContent = 'Authenticating...';

  try {
    const res = await fetch('/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
      body: JSON.stringify({ username, password })
    });    const contentType = res.headers.get('content-type') || '';
    if (!contentType.includes('application/json')) {
      const text = await res.text();
      throw new Error(text.slice(0, 120));
    }const data = await res.json();

    if (res.ok && data.success) {
      document.getElementById('loginForm').style.display = 'none';
      document.getElementById('successOverlay').classList.add('visible');
      setTimeout(() => { window.location.href = data.redirect_url || '/dashboard'; }, 1400);
    } else {
      throw new Error(data.message || 'Invalid credentials.');
    }
  } catch (err) {
    btn.disabled = false;
    btn.textContent = 'Sign in';
    errorTxt.textContent = err.message;
    errorDiv.classList.add('visible');
    document.getElementById('password').value = '';
    document.getElementById('password').focus();
  }
});

document.getElementById('username').focus();
</script>
</body>
</html>
